# 字幕精细化 Mask 测试及实际擦除配置
# 所有相对路径均相对于本配置文件所在目录解析。
# 修改本文件后直接运行：python -m backend.tools.subtitle_mask_video

[integration]
# 是否在正式字幕擦除流程中使用本文件生成逐帧精细化 mask。
# true：STTN字幕检测、LAMA、ProPainter 和 OpenCV 使用精细化 mask；
# false：完整回退到项目原有的 OCR 矩形 mask 流程。
# STTN智能擦除本身跳过 OCR，因此始终使用原有的手工选区 mask。
use_refined_mask = true

# 正式擦除生成精细化 mask 时，是否同步输出涂黑 mask 的原视频预览。
# 该过程复用同一次逐帧 mask 生成，不会再次执行 OCR。
write_mask_preview = true

# 预览输出路径。留空时自动输出到输入视频旁边：<原文件名>_mask_preview.mp4。
# 设置相对路径时，相对于项目根目录解析。
mask_preview_output =

[video]
# 仅供 mask preview 脚本使用的输入视频，可以使用相对路径或绝对路径。
# 正式擦除流程始终处理 GUI/命令行当前选中的视频，不读取这里的 input。
input = ..\training\act8.mp4

# 只处理输入视频开头的指定秒数，便于快速调试 mask。
# 0 表示处理完整视频；例如设置为 5 表示仅执行 OCR 并输出前 5 秒。
duration_seconds = 0

# 涂黑 mask 后的预览视频。留空时输出到输入视频旁，文件名后缀为 _mask_preview.mp4。
output =

# 是否额外生成纯黑白二值 mask 视频。
write_mask_video = false

# 二值 mask 视频路径。留空时输出到输入视频旁，文件名后缀为 _mask.mp4。
mask_output =

[ocr]
# OCR 检测区域，每行一个，顺序为 ymin,ymax,xmin,xmax，所有值范围为 0~1。
# 留空表示全画面。可以继续增加缩进的行来配置多个区域。
# 这里将底部长条区域划分为多个短区域以提高检测精度
# 注意正式去除字幕时不生效，需要通过命令行 -r 传入
areas =
    0.7667,0.8944,0.0583,0.3500
    0.7667,0.8944,0.3100,0.6200
    0.7667,0.8944,0.5800,0.8573

# 旧版单区域配置，保留用于兼容。areas 非空时优先使用 areas。
area =

# 是否先按每个 OCR 区域裁剪画面，再分别执行 OCR。
# 开启后可减少区域外 UI 和背景干扰，并让小字在 OCR 输入中占据更大比例。
# 正式擦除使用 GUI/命令行传入的区域；独立预览使用上面的 areas/area。
crop_before_ocr = true

# 裁剪区域四周额外保留的上下文像素。检测框中心仍须位于原始区域内。
# 太小可能截断贴近边界的字符，太大会引入更多区域外干扰，建议从 10 开始。
crop_padding = 10

# 裁剪后送入 OCR 前的放大倍数。2.0 对短句、小标点和细字符通常更友好。
# 倍数越大耗时和显存占用越高；1.0 表示不额外放大。
crop_upscale = 2.0

# 多个裁剪区域重叠时，检测框 IoU 达到该值便视为同一个框并合并。
# 建议保持在 0.6~0.8；区域互不重叠时基本不会触发；0 表示关闭去重。
crop_dedup_iou = 0.7

# OCR 采样间隔帧数。0 表示按视频帧率自适应：60fps=4、30fps=3、低帧率=2。
# 每个采样帧识别出的 OCR 框会应用到整个采样块；颜色精细化 mask 仍然逐帧生成。
# 例如设置为 3 时，第1帧框用于1~3帧，第4帧框用于4~6帧。
# 设置为 1 会逐帧执行 OCR，召回率最高，但耗时明显增加。
sample_step = 0

# OCR 输入图像最长边。留空使用模型默认值 960。
# 对小标点和“一”漏检时可尝试 1280 或 1536，数值越大越慢、显存占用越高。
limit_side_len = 2048

# 文本像素概率阈值。留空使用模型默认值 0.3。
# 降到 0.20~0.25 可提高细线和半透明文字召回率，同时会增加误检。
thresh = 0.15

# 文本框平均置信度阈值。留空使用模型默认值 0.6。
# 小字符漏检时可尝试 0.4~0.5，越低误检越多。
box_thresh = 0.1

# OCR 检测框扩张比例。留空使用模型默认值 1.5。
# 它只能扩张已经检测到的框，不能恢复完全漏掉的字符。
unclip_ratio =

[mask]
# 字幕填充色，格式为 R,G,B 或 #RRGGBB。
# 适用于字幕颜色在200,200,200到255,255,255之间的情形
color = 230,230,230

# Lab 色彩空间中的严格核心颜色距离。越大召回越高、误选背景也越多。
core_tolerance = 32.0

# Lab 色彩空间中的宽松边缘颜色距离，必须不小于 core_tolerance。
# 宽松像素只有与核心像素连通才会保留。
edge_tolerance = 80.0

# 近似灰度约束：仅用于 core_tolerance 之外的边缘候选像素。
# 满足 core_tolerance 的高可信核心像素不执行此约束。
# 下面的数值表示像素三个通道中最大值与最小值允许的最大差值。
# 例如 200,208,196 的通道跨度为 12。建议从 10~15 开始。
# 设置为 -1 可关闭该约束；设置为 0 则要求三个通道完全相等。
max_channel_spread = 10

# OCR 框向四周扩展的像素数，仅影响颜色 mask 搜索范围，不提高 OCR 召回率。
box_padding = 5

# 是否根据当前帧的字幕核心颜色，从 OCR 框边缘逐步寻找漏检字符并扩大检测框。
# 适合补回省略号、句号、“一”等与已识别文字相邻但未被 OCR 框覆盖的内容。
box_expand_enabled = true

# 每次向左、右、上、下探查的带状区域宽度，单位为像素。
# 字符之间的空隙大于该值时会停止扩展；建议先从 4~8 开始。
box_expand_step = 20

# 单个 OCR 框左右方向最多扩展的像素数。字幕横向排列时可适当设大。
box_expand_max_x = 500

# 单个 OCR 框上下方向最多扩展的像素数。建议明显小于横向值，避免吸收相邻 UI。
# 设为 0 可完全关闭上下扩展，但仍保留左右扩展。
box_expand_max_y = 20

# 每个新探查带中至少出现多少个核心颜色像素，才允许继续扩大检测框。
# 1 对单像素标点更敏感但容易受背景亮点影响；建议先使用 2。
box_expand_min_core_pixels = 4

# 从核心像素向宽松颜色像素生长的迭代次数，用于吸收抗锯齿和半透明边缘。
edge_growth_iterations = 3

# 闭运算核尺寸，用于连接小断点和填补细小空洞；0 或 1 表示关闭。
# 偶数会自动调整为下一个奇数。
close_kernel_size = 3

# 连通域最小面积。小于该面积且远离主要文字的孤立点会被删除。
# 不宜设置太大，否则可能删除句号、冒号等小标点。
min_component_area = 2

# 小连通域与主要文字的最大保留距离，单位为像素。
isolation_distance = 6

# 最终 mask 膨胀核尺寸；0 或 1 表示关闭。常用值为 3 或 5。
# = 4 比较好， = 3 容易保留字幕边缘
dilation_size = 4

# 最终 mask 膨胀次数；0 表示关闭。
dilation_iterations = 1

[secondary_mask]
# 是否启用左侧特殊字幕的第二检测模式。
# 每个 OCR 框会独立判断，不影响同一帧内使用普通颜色的其他字幕框。
enabled = true

# 只有 OCR 框中心位于画面左侧该比例以内，且框内完全没有主模式核心像素时，
# 才会切换到第二模式。0.25 表示画面左侧 25%。
left_ratio = 0.25

# 第二种字幕的填充色，格式仍为 R,G,B 或 #RRGGBB。
# 对约 50~100 的灰色字幕，建议以区间中点 75 作为目标颜色。
color = 75,75,75

# 以下参数只作用于第二字幕模式。
# 为避免吸收左侧的灰色背景，第二字幕模式不执行颜色引导扩框，
# 只在原始 OCR 框及主配置的 box_padding 范围内生成精细化 mask。
core_tolerance = 32.0
edge_tolerance = 32.0
max_channel_spread = 5

[temporal]
# 将后续 N 帧的 mask 与当前帧合并，用于从完全显现的字幕借用 mask。
# 0 表示关闭。30fps 可先尝试 6~12；过大会把下一句字幕提前带入。
future_mask_frames = 10

# 当前非空 mask 连续近似不变多少帧后，停止借用未来帧。
# 0 表示自动使用 future_mask_frames 的值。
mask_stability_frames = 0

# 两帧 mask 的 IoU 达到该值时认为近似不变，范围为 0~1。
# 建议从 0.995 开始；降低该值更容易判定稳定，但可能过早停止未来帧合并。
mask_stability_iou = 0.995

# 是否保持已经借入的未来 mask 在相邻输出帧中的连续性。
# 开启后，只要这些像素仍被当前未来窗口支持，就不会因稳定性截止而中途消失；
# 稳定字幕也不会因此吸收下一句新增的 mask 像素。
preserve_future_mask_continuity = true

[preview]
# 是否在涂黑预览视频上绘制绿色 OCR 检测框。
draw_ocr_boxes = true

# 是否绘制橙色的颜色引导扩展框。绿色框是原始 OCR，橙色框是扩展后的范围。
draw_expanded_boxes = true
